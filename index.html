<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>รายรับ-รายจ่าย</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --primary: #6B3A2A;
    --primary-dark: #2C1A10;
    --accent: #A07828;
    --accent-light: #C9A84C;
    --green: #4A5A30;      /* Army */
    --red: #9A4020;        /* Camel-red */
    --gray: #7A6B5A;       /* Taupe */
    --bg: #C8B49A;         /* Sand */
    --surface: #EDE0CC;    /* Cream */
    --card: #F5ECD8;       /* Ivory */
    --white: #FDF8F2;      /* White */
    --shadow: 0 2px 12px rgba(61,26,13,.15);
    --text: #2C2018;       /* Charcoal-brown */
    --text-secondary: #7A6B5A;  /* Taupe */
  }
  body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); max-width: 430px; margin: 0 auto; min-height: 100vh; position: relative; overflow-x: hidden; }

  /* HEADER */
  .header { background: #5C3017; padding: 20px 16px 16px; color: #FDF8F0; }
  .header h1 { font-size: 18px; font-weight: 700; margin-bottom: 14px; text-align: center; text-shadow: 0 1px 4px rgba(0,0,0,.4); color: #F5E6C8; }
  .summary-cards { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .card { background: rgba(0,0,0,.25); backdrop-filter: blur(10px); border-radius: 14px; padding: 10px 8px; text-align: center; border: 1px solid rgba(255,255,255,.15); }
  .card label { font-size: 11px; color: #D4C4A8; display: block; margin-bottom: 4px; }
  .card .amount { font-size: 16px; font-weight: 700; }
  .card .amount.income { color: #A8C890; }   /* soft army green */
  .card .amount.expense { color: #E8A888; }  /* soft camel */
  .card .amount.balance { color: #F0D898; }  /* sand gold */

  /* TABS */
  .tabs { display: flex; background: var(--surface); border-bottom: 2px solid #B89A78; }
  .tab { flex: 1; padding: 12px; text-align: center; font-size: 13px; color: var(--gray); cursor: pointer; border-bottom: 3px solid transparent; transition: all .2s; }
  .tab.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 700; background: var(--card); }

  /* CALENDAR VIEW */
  .calendar-wrap { padding: 14px; }
  .cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .cal-nav button { background: var(--primary); border: none; border-radius: 8px; padding: 6px 12px; cursor: pointer; color: #F5E6C8; font-size: 18px; }
  .cal-nav .month-title { font-size: 16px; font-weight: 700; color: var(--text); }
  .today-btn { background: var(--accent) !important; color: #1F0F07 !important; font-size: 12px !important; font-weight: 700 !important; padding: 6px 10px !important; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
  .cal-day-name { text-align: center; font-size: 11px; color: var(--primary); padding: 4px 0; font-weight: 700; }
  .cal-day { min-height: 56px; border-radius: 8px; padding: 3px; cursor: pointer; transition: background .15s; position: relative; background: #F5ECD8; }
  .cal-day:hover { background: #E8D8B8; }
  .cal-day.today { background: #5C3017; }
  .cal-day.today .day-num { color: #F5E6C8; font-weight: 700; }
  .cal-day.today .day-income { color: #90EEB0; }
  .cal-day.today .day-expense { color: #FFB0A0; }
  .cal-day.selected { background: #A0782A; outline: 2px solid #5C3017; }
  .cal-day.selected .day-num { color: #FDF8F0; font-weight: 700; }
  .cal-day.selected .day-income { color: #C8F0D8; }
  .cal-day.selected .day-expense { color: #FFD0C0; }
  .cal-day.today.selected { background: #5C3017; outline: 2px solid #A0782A; }
  .cal-day .day-num { font-size: 12px; color: #2C2018; font-weight: 600; }
  .cal-day .day-income { font-size: 9.5px; color: #3A4A20; font-weight: 700; }   /* army */
  .cal-day .day-expense { font-size: 9.5px; color: #803010; font-weight: 700; }  /* camel-red */
  .cal-day.empty { cursor: default; background: transparent; }

  /* TRANSACTION LIST */
  .section { padding: 14px; }
  .section-title { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .tx-item { background: var(--card); border-radius: 14px; padding: 12px 14px; margin-bottom: 8px; box-shadow: var(--shadow); display: flex; align-items: center; gap: 12px; cursor: pointer; transition: transform .1s; border-left: 4px solid var(--accent); }
  .tx-item:hover { transform: translateY(-1px); }
  .tx-icon { width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  .tx-info { flex: 1; min-width: 0; }
  .tx-name { font-size: 14px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tx-meta { font-size: 11px; color: var(--gray); margin-top: 2px; }
  .tx-amount { font-size: 15px; font-weight: 700; text-align: right; flex-shrink: 0; }
  .tx-amount.income { color: var(--green); }
  .tx-amount.expense { color: var(--red); }

  /* CHART VIEW */
  .chart-wrap { padding: 14px; }
  .chart-container { background: var(--card); border-radius: 16px; padding: 16px; box-shadow: var(--shadow); }
  .chart-title { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 12px; }
  .chart-legend { margin-top: 12px; display: flex; flex-direction: column; gap: 8px; }
  .legend-item { display: flex; align-items: center; justify-content: space-between; font-size: 13px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; margin-right: 8px; flex-shrink: 0; }
  .legend-left { display: flex; align-items: center; }

  /* FAB */
  .fab { position: fixed; bottom: 80px; right: 16px; display: flex; flex-direction: column; gap: 10px; z-index: 100; }
  .fab-btn { width: 50px; height: 50px; border-radius: 50%; border: none; cursor: pointer; font-size: 22px; box-shadow: 0 4px 16px rgba(0,0,0,.3); transition: transform .15s; display: flex; align-items: center; justify-content: center; }
  .fab-btn:hover { transform: scale(1.1); }
  .fab-main { background: #5C3017; color: #F5E6C8; width: 58px; height: 58px; font-size: 28px; border: 2px solid #A0782A; }
  .fab-slip { background: #5C4A2A; color: #F5E6C8; }
  .fab-chart { background: #A0782A; color: #1F0F07; }

  /* BOTTOM NAV */
  .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; background: var(--primary-dark); border-top: 2px solid var(--accent); display: flex; box-shadow: 0 -4px 16px rgba(0,0,0,.3); z-index: 99; }
  .nav-btn { flex: 1; padding: 10px 4px 12px; text-align: center; cursor: pointer; border: none; background: none; color: #9A7A5A; font-size: 13px; font-weight: 700; transition: color .2s; }
  .nav-btn .nav-icon { font-size: 22px; display: block; margin-bottom: 2px; }
  .nav-btn.active { color: var(--accent-light); }
  .nav-btn.center { position: relative; }
  .nav-btn.center .nav-icon { background: #A0782A; border-radius: 50%; width: 46px; height: 46px; display: flex; align-items: center; justify-content: center; margin: -12px auto 2px; font-size: 22px; }

  .content { padding-bottom: 80px; }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(20,8,0,.65); z-index: 200; align-items: flex-end; }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--white); border-radius: 24px 24px 0 0; width: 100%; max-width: 430px; margin: 0 auto; padding: 20px; max-height: 90vh; overflow-y: auto; }
  .modal-handle { width: 40px; height: 4px; background: #C4A882; border-radius: 2px; margin: 0 auto 16px; }
  .modal-title { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 18px; }
  .form-group { margin-bottom: 14px; }
  .form-group label { font-size: 13px; color: var(--gray); display: block; margin-bottom: 6px; font-weight: 600; }
  .form-group input, .form-group select, .form-group textarea { width: 100%; border: 1.5px solid #C4A882; border-radius: 10px; padding: 10px 12px; font-size: 14px; color: var(--text); outline: none; transition: border-color .2s; background: var(--card); }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--primary); }
  .type-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .type-btn { padding: 10px; border-radius: 10px; border: 2px solid #C4A882; background: var(--card); cursor: pointer; font-size: 14px; font-weight: 600; transition: all .2s; color: var(--gray); }
  .type-btn.income.active { border-color: #4A5A30; background: #D8E0C0; color: #2A3A10; }  /* army */
  .type-btn.expense.active { border-color: #9A4020; background: #E8D0C0; color: #602010; }  /* camel */
  .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 18px; }
  .btn { padding: 12px; border-radius: 12px; border: none; font-size: 14px; font-weight: 700; cursor: pointer; transition: opacity .2s; }
  .btn:hover { opacity: .85; }
  .btn-primary { background: #5C3017; color: #F5E6C8; }
  .btn-secondary { background: #DDD0BC; color: var(--gray); }
  .btn-danger { background: #E8D0C0; color: #9A4020; }

  /* SLIP MODAL */
  .slip-upload { border: 2px dashed #A0782A; border-radius: 14px; padding: 24px; text-align: center; cursor: pointer; margin-bottom: 14px; transition: background .2s; }
  .slip-upload:hover { background: #EDD9B8; }
  .slip-preview { width: 100%; border-radius: 12px; max-height: 200px; object-fit: contain; margin-bottom: 10px; display: none; }
  .slip-upload-icon { font-size: 40px; display: block; }
  .slip-upload-text { font-size: 13px; color: var(--gray); margin-top: 6px; }

  /* EMPTY */
  .empty { text-align: center; padding: 40px 20px; color: var(--gray); }
  .empty-icon { font-size: 48px; display: block; margin-bottom: 10px; }

  /* CATEGORY ICONS */
  .cat-food { background: #D4A85A; }
  .cat-transport { background: #7A9E7E; }
  .cat-shopping { background: #C4845A; }
  .cat-health { background: #6B9E7A; }
  .cat-entertainment { background: #8A7A5A; }
  .cat-income { background: #5A8A6A; }
  .cat-other { background: #9A8A7A; }

  /* DATE FILTER */
  .date-filter { display: flex; gap: 8px; padding: 0 14px 10px; overflow-x: auto; }
  .date-filter::-webkit-scrollbar { display: none; }
  .filter-chip { background: var(--card); border: 1.5px solid #B89A72; border-radius: 20px; padding: 5px 14px; font-size: 12px; white-space: nowrap; cursor: pointer; transition: all .2s; color: var(--text); }
  .filter-chip.active { background: var(--primary); border-color: var(--primary); color: #F5E6C8; }

  @media (max-width: 430px) { body { max-width: 100vw; } .bottom-nav { max-width: 100vw; } }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <h1>💰 รายรับ-รายจ่าย</h1>
  <div class="summary-cards">
    <div class="card">
      <label>รายรับ</label>
      <div class="amount income" id="totalIncome">0.00</div>
    </div>
    <div class="card">
      <label>รายจ่าย</label>
      <div class="amount expense" id="totalExpense">0.00</div>
    </div>
    <div class="card">
      <label>คงเหลือ</label>
      <div class="amount balance" id="totalBalance">0.00</div>
    </div>
  </div>
</div>


<div class="content">
  <!-- CALENDAR TAB -->
  <div id="tab-calendar">
    <div class="calendar-wrap">
      <div class="cal-nav">
        <button onclick="changeMonth(-1)">‹</button>
        <span class="month-title" id="monthTitle"></span>
        <button class="today-btn" onclick="goToday()">วันนี้</button>
        <button onclick="changeMonth(1)">›</button>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </div>
    <div class="section">
      <div class="section-title">🧾 รายการวันที่ <span id="selectedDateLabel"></span></div>
      <div id="dayTransactions"></div>
    </div>
  </div>

  <!-- LIST TAB -->
  <div id="tab-list" style="display:none">
    <div class="date-filter" id="filterChips"></div>
    <div class="section">
      <div class="section-title">📋 รายการทั้งหมด</div>
      <div id="allTransactions"></div>
    </div>
  </div>

  <!-- CHART TAB -->
  <div id="tab-chart" style="display:none">
    <div class="chart-wrap">
      <div class="chart-container">
        <div class="chart-title">📊 สัดส่วนรายจ่ายตามหมวดหมู่</div>
        <canvas id="expenseChart" height="220"></canvas>
        <div class="chart-legend" id="chartLegend"></div>
      </div>
      <br>
      <div class="chart-container">
        <div class="chart-title">📈 รายรับ-รายจ่ายรายวัน (เดือนนี้)</div>
        <canvas id="barChart" height="200"></canvas>
      </div>
    </div>
  </div>
</div>

<!-- FAB -->
<div class="fab">
  <button class="fab-btn fab-slip" onclick="openSlipModal()" title="โยนสลิป">📎</button>
  <button class="fab-btn fab-main" onclick="openAddModal()" title="เพิ่มรายการ">＋</button>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-btn active" onclick="switchTab('calendar')">
    <span class="nav-icon">💳</span>การเงิน
  </button>
  <button class="nav-btn" onclick="switchTab('list')">
    <span class="nav-icon">📋</span>รายการ
  </button>
  <button class="nav-btn center" onclick="openAddModal()">
    <span class="nav-icon">➕</span>เพิ่ม
  </button>
  <button class="nav-btn" onclick="switchTab('chart')">
    <span class="nav-icon">📊</span>กราฟ
  </button>
  <button class="nav-btn" onclick="openSettings()">
    <span class="nav-icon">⚙️</span>ตั้งค่า
  </button>
</div>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalTitle">➕ เพิ่มรายการ</div>
    <div class="type-toggle">
      <button class="type-btn expense active" id="btnExpense" onclick="setType('expense')">💸 รายจ่าย</button>
      <button class="type-btn income" id="btnIncome" onclick="setType('income')">💰 รายรับ</button>
    </div>
    <br>
    <div class="form-group">
      <label>รายการ</label>
      <input type="text" id="txName" placeholder="เช่น ค่าอาหาร, เงินเดือน...">
    </div>
    <div class="form-group">
      <label>จำนวนเงิน (บาท)</label>
      <input type="number" id="txAmount" placeholder="0.00" min="0" step="0.01">
    </div>
    <input type="hidden" id="txDate">
    <input type="hidden" id="txCategory" value="📦 ทั่วไป">
    <input type="hidden" id="txNote" value="">
    <div class="btn-row" id="btnRow">
      <button class="btn btn-secondary" onclick="closeModal('addModal')">ยกเลิก</button>
      <button class="btn btn-primary" onclick="saveTransaction()">บันทึก</button>
    </div>
  </div>
</div>

<!-- SLIP MODAL -->
<div class="modal-overlay" id="slipModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">📎 โยนสลิป</div>
    <div class="slip-upload" onclick="document.getElementById('slipInput').click()">
      <img id="slipPreview" class="slip-preview" alt="slip">
      <span class="slip-upload-icon">📄</span>
      <div class="slip-upload-text">แตะเพื่อเลือกรูปสลิป</div>
    </div>
    <input type="file" id="slipInput" accept="image/*" style="display:none" onchange="handleSlip(event)">
    <div id="slipForm" style="display:none">
      <div class="form-group">
        <label>รายละเอียด (จากสลิป)</label>
        <input type="text" id="slipName" placeholder="เช่น โอนเงิน, รับเงิน...">
      </div>
      <div class="form-group">
        <label>จำนวนเงิน (บาท)</label>
        <input type="number" id="slipAmount" placeholder="0.00">
      </div>
      <div class="type-toggle">
        <button class="type-btn expense active" id="slipBtnExpense" onclick="setSlipType('expense')">💸 รายจ่าย</button>
        <button class="type-btn income" id="slipBtnIncome" onclick="setSlipType('income')">💰 รายรับ</button>
      </div>
      <br>
      <div class="form-group">
        <label>หมวดหมู่</label>
        <select id="slipCategory">
          <option value="💳 โอนเงิน">💳 โอนเงิน</option>
          <option value="🍜 อาหาร">🍜 อาหาร</option>
          <option value="🛒 ช้อปปิ้ง">🛒 ช้อปปิ้ง</option>
          <option value="💼 รายได้">💼 รายได้</option>
          <option value="📦 อื่นๆ">📦 อื่นๆ</option>
        </select>
      </div>
      <div class="form-group">
        <label>วันที่</label>
        <input type="date" id="slipDate">
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="closeModal('slipModal')">ยกเลิก</button>
      <button class="btn btn-primary" id="slipSaveBtn" style="display:none" onclick="saveSlip()">บันทึก</button>
    </div>
  </div>
</div>

<!-- SETTINGS MODAL -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">⚙️ ตั้งค่า</div>
    <div id="settingsMonthLabel" style="text-align:center;font-size:13px;color:#7A6B5A;margin-bottom:4px"></div>
    <div style="display:flex;flex-direction:column;gap:10px">
      <button class="btn btn-primary" style="width:100%;font-size:15px;padding:14px" onclick="exportCSV()">
        📤 ส่งออกไฟล์ CSV
      </button>
      <button class="btn" style="width:100%;font-size:15px;padding:14px;background:#5C3017;color:#F5E6C8" onclick="document.getElementById('importCSVInput').click()">
        📥 นำเข้าไฟล์ CSV
      </button>
      <input type="file" id="importCSVInput" accept=".csv" style="display:none" onchange="importCSV(event)">
      <div id="importStatus" style="font-size:12px;color:#6B5E52;text-align:center;min-height:18px"></div>
      <button class="btn btn-danger" style="width:100%;font-size:15px;padding:14px" onclick="clearCurrentMonth()">
        🗑️ ล้างข้อมูลเดือนที่เลือก
      </button>
    </div>
    <div style="margin-top:12px">
      <button class="btn btn-secondary" style="width:100%" onclick="closeModal('settingsModal')">ปิด</button>
    </div>
  </div>
</div>

<!-- DELETE CONFIRM MODAL -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">🗑️ ลบรายการ?</div>
    <p style="color:#6b7280;font-size:14px;margin-bottom:18px">คุณต้องการลบรายการนี้ใช่ไหม?</p>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="closeModal('deleteModal')">ยกเลิก</button>
      <button class="btn btn-danger" onclick="confirmDelete()">ลบ</button>
    </div>
  </div>
</div>

<script>
// ========== DATA ==========
let transactions = JSON.parse(localStorage.getItem('transactions') || '[]');
let currentDate = new Date();
let selectedDate = new Date();
let currentTab = 'calendar';
let editingId = null;
let deletingId = null;
let txType = 'expense';
let slipType = 'expense';

const COLORS = ['#729598','#DCB084','#A19F89','#903729','#4F5E62','#E9DCCF','#B8755A','#5A7A7C'];

function save() { localStorage.setItem('transactions', JSON.stringify(transactions)); }
function fmt(n) { return Number(n).toLocaleString('th-TH', {minimumFractionDigits:2, maximumFractionDigits:2}); }
function todayStr() { return new Date().toISOString().split('T')[0]; }
function dateLabel(d) {
  const months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  const dt = new Date(d);
  return `${dt.getDate()} ${months[dt.getMonth()]} ${dt.getFullYear()+543}`;
}

function initSampleData() {
  if (transactions.length === 0) {
    const today = new Date();
    const m = String(today.getMonth()+1).padStart(2,'0');
    const y = today.getFullYear();
    transactions = [
      { id: 1, type:'income',  name:'เงินเดือน',        amount:25000, category:'💼 รายได้',  date:`${y}-${m}-01`, note:'' },
      { id: 2, type:'expense', name:'ค่าเช่า',           amount:8000,  category:'🏠 ที่พัก',  date:`${y}-${m}-01`, note:'' },
      { id: 3, type:'expense', name:'ค่าอาหาร',          amount:350,   category:'🍜 อาหาร',  date:`${y}-${m}-02`, note:'' },
      { id: 4, type:'expense', name:'ค่าน้ำมัน',         amount:500,   category:'🚗 เดินทาง',date:`${y}-${m}-03`, note:'' },

function updateSummary() {
  const m = currentDate.getMonth(), y = currentDate.getFullYear();
  const monthly = transactions.filter(t => {
    const d = new Date(t.date); return d.getMonth()===m && d.getFullYear()===y;
  });
  const income = monthly.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const expense = monthly.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  document.getElementById('totalIncome').textContent = fmt(income);
  document.getElementById('totalExpense').textContent = fmt(expense);
  const bal = income - expense;
  const el = document.getElementById('totalBalance');
  el.textContent = fmt(bal);
}

function renderCalendar() {
  const months_th = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
  const y = currentDate.getFullYear(), m = currentDate.getMonth();
  document.getElementById('monthTitle').textContent = `${months_th[m]} ${y+543}`;
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  ['อา','จ','อ','พ','พฤ','ศ','ส'].forEach(d => {
    const el = document.createElement('div');
    el.className = 'cal-day-name'; el.textContent = d;
    grid.appendChild(el);
  });
  const first = new Date(y, m, 1).getDay();
  const days = new Date(y, m+1, 0).getDate();
  const today = new Date();
  for (let i=0; i<first; i++) { const e=document.createElement('div'); e.className='cal-day empty'; grid.appendChild(e); }
  for (let d=1; d<=days; d++) {
    const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dayTx = transactions.filter(t=>t.date===dateStr);
    const inc = dayTx.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
    const exp = dayTx.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
    const el = document.createElement('div');
    el.className = 'cal-day';
    el.dataset.date = dateStr;
    if (y===today.getFullYear() && m===today.getMonth() && d===today.getDate()) el.classList.add('today');
    // Mark selected day
    const selStr2 = `${selectedDate.getFullYear()}-${String(selectedDate.getMonth()+1).padStart(2,'0')}-${String(selectedDate.getDate()).padStart(2,'0')}`;
    if (dateStr === selStr2) el.classList.add('selected');
    el.innerHTML = `<div class="day-num">${d}</div>${inc>0?`<div class="day-income">${fmt(inc)}</div>`:''}${exp>0?`<div class="day-expense">${fmt(exp)}</div>`:''}`;
    el.onclick = () => selectDay(dateStr, d);
    grid.appendChild(el);
  }
  const selStr = `${selectedDate.getFullYear()}-${String(selectedDate.getMonth()+1).padStart(2,'0')}-${String(selectedDate.getDate()).padStart(2,'0')}`;
  renderDayTransactions(selStr);
}

    if (el.querySelector('.day-num') && el.querySelector('.day-num').textContent == String(new Date(dateStr+'T00:00:00').getDate())) {

    }

function getCatClass(cat) {

  if (cat.includes('เดินทาง')||cat.includes('น้ำมัน')) return 'transport';
  if (cat.includes('ช้อป')) return 'shopping';
  if (cat.includes('สุขภาพ')) return 'health';

let pieChart = null, barChart = null;
function renderChart() {
  const m = currentDate.getMonth(), y = currentDate.getFullYear();
  const expenses = transactions.filter(t=>t.type==='expense'&&new Date(t.date).getMonth()===m&&new Date(t.date).getFullYear()===y);
  const catMap = {};
  expenses.forEach(t=>{ catMap[t.category]=(catMap[t.category]||0)+t.amount; });
  const labels = Object.keys(catMap);
  const data = Object.values(catMap);
  const total = data.reduce((s,v)=>s+v,0);

  const ctx = document.getElementById('expenseChart').getContext('2d');
  if (pieChart) pieChart.destroy();
  pieChart = new Chart(ctx, {
    type:'doughnut',
    data:{ labels, datasets:[{ data, backgroundColor:COLORS.slice(0,labels.length), borderWidth:2, borderColor:'#fff' }] },
    options:{ plugins:{ legend:{ display:false } }, cutout:'65%', animation:{ animateRotate:true } }
  });
  const legend = document.getElementById('chartLegend');
  legend.innerHTML = labels.map((l,i)=>`
    <div class="legend-item">
      <div class="legend-left"><div class="legend-dot" style="background:${COLORS[i%COLORS.length]}"></div>${l}</div>
      <div style="font-weight:700">${fmt(data[i])} <span style="color:#9ca3af;font-size:11px">(${total>0?Math.round(data[i]/total*100):0}%)</span></div>
    </div>`).join('');

  // BAR CHART
  const days = new Date(y,m+1,0).getDate();
  const dayLabels=[],incArr=[],expArr=[];
  for(let d=1;d<=days;d++){
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dt=transactions.filter(t=>t.date===ds);
    dayLabels.push(d);
    incArr.push(dt.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0));
    expArr.push(dt.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0));
  }
  const ctx2 = document.getElementById('barChart').getContext('2d');
  if (barChart) barChart.destroy();
  barChart = new Chart(ctx2,{
    type:'bar',
    data:{ labels:dayLabels, datasets:[
      {label:'รายรับ',data:incArr,backgroundColor:'#729598',borderRadius:4},
      {label:'รายจ่าย',data:expArr,backgroundColor:'#903729',borderRadius:4}
    ]},
    options:{ plugins:{legend:{position:'top'}}, scales:{ x:{ticks:{font:{size:10}}}, y:{ticks:{callback:v=>fmt(v)}} }, responsive:true }
  });
}

function parseCSVLine(line) {
  const result = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { inQ = !inQ; }
    else if (c === ',' && !inQ) { result.push(cur.trim()); cur = ''; }
    else { cur += c; }
  }
  result.push(cur.trim());
  return result;
}

function toISODate(raw) {
  if (!raw) return '';
  raw = raw.trim();
  // DD/MM/YYYY → YYYY-MM-DD
  const m1 = raw.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (m1) return `${m1[3]}-${m1[2].padStart(2,'0')}-${m1[1].padStart(2,'0')}`;
  // YYYY-MM-DD already
  if (/^\d{4}-\d{2}-\d{2}$/.test(raw)) return raw;
  return '';
}

function importCSV(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const text = ev.target.result.replace(/^﻿/, '');
      const lines = text.split(/\r?\n/).filter(l => l.trim());
      if (lines.length < 2) { document.getElementById('importStatus').textContent = '❌ ไฟล์ว่างหรือไม่ถูกต้อง'; return; }

      // Find header row (row that contains 'วันที่' or 'date')
      let headerIdx = lines.findIndex(l => {
        const lower = l.toLowerCase();
        return lower.includes('วันที่') || lower.includes('date');
      });
      if (headerIdx < 0) { document.getElementById('importStatus').textContent = '❌ ไม่พบแถว header'; return; }

      const header = parseCSVLine(lines[headerIdx]).map(h => h.replace(/"/g,'').trim());
      const iDate  = header.findIndex(h => h.includes('วันที่') || h.toLowerCase().includes('date'));
      const iName  = header.findIndex(h => h.includes('รายการ') || h.toLowerCase().includes('name'));
      const iInc   = header.findIndex(h => h.includes('รายรับ') || h.toLowerCase().includes('income'));
      const iExp   = header.findIndex(h => h.includes('รายจ่าย') || h.toLowerCase().includes('expense'));
      const iAmt   = header.findIndex(h => h.includes('จำนวน') || h.toLowerCase().includes('amount'));
      const iType  = header.findIndex(h => h.includes('ประเภท') || h.toLowerCase().includes('type'));
      const iCat   = header.findIndex(h => h.includes('หมวดหมู่') || h.toLowerCase().includes('category'));

      if (iDate < 0 || iName < 0) { document.getElementById('importStatus').textContent = '❌ ไม่พบคอลัมน์วันที่หรือรายการ'; return; }

      let added = 0, skipped = 0;
      const existingKeys = new Set(transactions.map(t => `${t.date}|${t.name}|${t.amount}`));

      lines.slice(headerIdx + 1).forEach(line => {
        if (!line.trim()) return;
        const cols = parseCSVLine(line);
        const rawDate = cols[iDate] || '';
        const name    = cols[iName] || '';
        const date    = toISODate(rawDate);

        // Determine amount and type
        let amount = 0, type = 'expense';
        if (iInc >= 0 && iExp >= 0) {
          // SaveMoney format: separate income/expense columns
          const incVal = parseFloat((cols[iInc]||'').replace(/,/g,''));
          const expVal = parseFloat((cols[iExp]||'').replace(/,/g,''));
          if (!isNaN(incVal) && incVal > 0) { amount = incVal; type = 'income'; }
          else if (!isNaN(expVal) && expVal > 0) { amount = expVal; type = 'expense'; }
        } else if (iAmt >= 0) {
          amount = parseFloat((cols[iAmt]||'').replace(/,/g,''));
          if (iType >= 0) {
            const t = cols[iType] || '';
            type = (t.includes('รับ') || t.toLowerCase().includes('income')) ? 'income' : 'expense';
          }
        }

        const category = iCat >= 0 && cols[iCat] ? cols[iCat] : '📦 ทั่วไป';

        if (!date || !name || isNaN(amount) || amount <= 0) { skipped++; return; }
        const key = `${date}|${name}|${amount}`;
        if (existingKeys.has(key)) { skipped++; return; }
        transactions.push({ id: Date.now() + Math.random(), type, name, amount, date, category, note: '' });
        existingKeys.add(key);
        added++;
      });

      save(); refresh();
      document.getElementById('importStatus').textContent =
        `✅ นำเข้าสำเร็จ ${added} รายการ${skipped > 0 ? ' (ข้าม ' + skipped + ' รายการ)' : ''}`;
      document.getElementById('importCSVInput').value = '';
    } catch(err) {
      document.getElementById('importStatus').textContent = '❌ เกิดข้อผิดพลาด: ' + err.message;
    }
  };
  reader.readAsText(file, 'UTF-8');
}

function exportCSV() {
  const rows = [['วันที่','ประเภท','รายการ','จำนวนเงิน']];
  const sorted = [...transactions].sort((a,b)=>a.date.localeCompare(b.date));
  sorted.forEach(t => {
    rows.push([t.date, t.type==='income'?'รายรับ':'รายจ่าย', t.name, t.amount]);
  });
  const csv = '﻿' + rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'รายรับรายจ่าย.csv';
  a.click(); URL.revokeObjectURL(url);
  closeModal('settingsModal');
}
